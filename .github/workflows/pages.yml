name: deploy-pages
# main'e her push'ta siteyi GitHub Pages'e yayınlar.
# İlk kurulum: repo Settings → Pages → Source: "GitHub Actions" seçin.
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Pages daha önce elle etkinleştirilmemişse otomatik etkinleştir
          # (Settings→Pages adımını gereksiz kılar; "Not Found" hatasını çözer).
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
